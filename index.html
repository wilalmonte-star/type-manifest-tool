<style>

  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:36px 36px;pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    pointer-events:none;z-index:0;}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
  .orb-1{width:400px;height:400px;background:rgba(155,48,255,0.18);top:-100px;left:-100px;animation:drift1 8s ease-in-out infinite alternate;}
  .orb-2{width:300px;height:300px;background:rgba(255,106,0,0.15);bottom:-80px;right:-80px;animation:drift2 10s ease-in-out infinite alternate;}
  @keyframes drift1{to{transform:translate(40px,30px);}}
  @keyframes drift2{to{transform:translate(-30px,-40px);}}
  .container{width:100%;max-width:600px;position:relative;z-index:1;}
  header{margin-bottom:28px;text-align:center;}
  .retro-tag{display:inline-block;font-family:'Press Start 2P',monospace;font-size:7px;
    letter-spacing:0.15em;color:var(--orange-bright);border:1px solid var(--orange);
    padding:5px 14px;margin-bottom:16px;position:relative;
    text-shadow:0 0 8px var(--orange);box-shadow:0 0 10px rgba(255,106,0,0.3);}
  .retro-tag::before{content:'▶';position:absolute;top:50%;left:-16px;transform:translateY(-50%);color:var(--orange);font-size:8px;}
  .retro-tag::after{content:'◀';position:absolute;top:50%;right:-16px;transform:translateY(-50%);color:var(--orange);font-size:8px;}
  h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(26px,6vw,48px);
    line-height:1.1;letter-spacing:0.05em;
    background:linear-gradient(135deg,var(--orange-bright) 0%,var(--orange) 40%,var(--purple) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:titlePulse 3s ease-in-out infinite alternate;}
  @keyframes titlePulse{
    from{filter:drop-shadow(0 0 15px rgba(155,48,255,0.4));}
    to{filter:drop-shadow(0 0 30px rgba(255,106,0,0.6));}}
  .subtitle{margin-top:8px;font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
  .panel{background:linear-gradient(145deg,rgba(30,0,60,0.9),rgba(15,0,30,0.95));
    border:1px solid var(--purple-dim);border-radius:4px;
    box-shadow:0 0 0 1px rgba(155,48,255,0.1),0 0 30px rgba(155,48,255,0.15);
    overflow:hidden;position:relative;}
  .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--purple),var(--orange),transparent);
    animation:scanLine 3s linear infinite;}
  @keyframes scanLine{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
  .corner{position:absolute;width:12px;height:12px;border-color:var(--orange);border-style:solid;z-index:2;}
  .corner-tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
  .corner-tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
  .corner-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
  .corner-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
  .upload-area{padding:40px 32px;text-align:center;}
  .upload-icon{width:64px;height:64px;margin:0 auto 16px;border:2px solid var(--purple);border-radius:4px;

    box-shadow:0 0 16px rgba(155,48,255,0.3);}
  .upload-icon svg{width:28px;height:28px;stroke:var(--purple);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px var(--purple));}
  .upload-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:0.06em;}

  .choose-btn{display:inline-block;padding:14px 32px;background:transparent;

  #file-input{position:absolute;width:1px;height:1px;opacity:0;}

  .status-card{margin-top:12px;padding:14px 18px;display:none;align-items:center;gap:14px;}
  .status-card.show{display:flex;}
  .s-icon{width:38px;height:38px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--purple-dim);}
  .s-icon.loading{background:rgba(155,48,255,0.1);}
  .s-icon.success{background:rgba(0,255,204,0.08);border-color:var(--success);}
  .s-icon.error{background:rgba(255,45,120,0.08);border-color:var(--pink);}
  .spinner{width:18px;height:18px;border:2px solid rgba(155,48,255,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .s-text{flex:1;}
  .s-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.05em;margin-bottom:3px;}
  .s-detail{font-size:10px;color:var(--muted);}

  .prog-lbl{margin-top:5px;font-size:9px;color:var(--muted);text-align:right;display:none;}

  .preview{margin-top:12px;display:none;}

  .prev-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .prev-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);text-transform:uppercase;}
  .badge{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--orange-bright);
    background:rgba(255,106,0,0.1);border:1px solid rgba(255,106,0,0.3);padding:3px 10px;border-radius:2px;}
  .prev-box{background:rgba(5,0,12,0.8);border:1px solid rgba(155,48,255,0.25);border-radius:4px;
    padding:12px 14px;max-height:180px;overflow-y:auto;font-size:10.5px;line-height:1.9;color:rgba(200,170,255,0.75);}
  .prev-box::-webkit-scrollbar{width:4px;}
  .prev-box::-webkit-scrollbar-thumb{background:var(--purple-dim);border-radius:2px;}
  .arow{display:flex;gap:8px;border-bottom:1px solid rgba(155,48,255,0.08);padding:2px 0;}

  .atxt{flex:1;}
  .acoord{font-size:9px;color:rgba(0,255,204,0.5);flex-shrink:0;white-space:nowrap;}
  .afail{font-size:9px;color:rgba(255,45,120,0.5);flex-shrink:0;}
  .stats{display:flex;gap:10px;margin-top:10px;}
  .stat{flex:1;background:rgba(155,48,255,0.06);border:1px solid rgba(155,48,255,0.2);border-radius:4px;padding:8px 12px;text-align:center;}
  .sval{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--orange-bright);}
  .slbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);margin-top:3px;}
  .sval.ok{color:var(--success);}
  .sval.bad{color:var(--pink);}
  .dl-btn{margin-top:14px;width:100%;padding:16px;background:transparent;
    border:2px solid var(--orange);border-radius:4px;color:var(--orange-bright);
    font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:0.1em;
    cursor:pointer;display:none;align-items:center;justify-content:center;gap:10px;

  .dl-btn.show{display:flex;}
  .dl-btn:hover{background:rgba(255,106,0,0.08);transform:translateY(-2px);}
  .dl-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .reset{display:block;text-align:center;margin-top:14px;font-size:10px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;}
  .reset:hover{color:var(--purple);}
  .errmsg{margin-top:12px;padding:12px 16px;background:rgba(255,45,120,0.06);border:1px solid rgba(255,45,120,0.25);
    border-radius:4px;font-size:11px;color:var(--pink);display:none;}
  .errmsg.show{display:block;}
  footer{margin-top:28px;text-align:center;font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(155,48,255,0.3);letter-spacing:0.15em;}

function geocode(addr){
  return fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(addr),{headers:{'Accept-Language':'en'}})
    .then(function(r){return r.json();})

    .catch(function(){return null;});
}

function buildKML(stops, name){
  var k='<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n';
  k+='  <name>'+esc(name)+'</name>\n';
  k+='  <Style id="pin"><IconStyle><color>ff0050ff</color><scale>1.1</scale><Icon><href>http://maps.google.com/mapfiles/kml/paddle/red-circle.png</href></Icon></IconStyle></Style>\n';

stops.forEach(function(s,i){
if(!s.geo) return;
k+=’  <Placemark><name>Stop ‘+(i+1)+’</name><description>’+esc(s.address)+’</description>’;
k+=’<styleUrl>#pin</styleUrl><Point><coordinates>’+s.geo.lon+’,’+s.geo.lat+’,0</coordinates></Point></Placemark>\n’;
});
return k+’</Document>\n</kml>’;
}

// ── Inflate (decompress) ZIP entry ──
function inflate(entry){
if(!entry || !entry.data || entry.data.length===0) return ‘’;
var bytes = entry.data;
if(!entry.compressed){
var s=’’; for(var i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return s;
}
// Use pako-free raw inflate via DecompressionStream (Safari 16.4+)
try {
// Synchronous fallback: manually decode using raw inflate
return rawInflate(bytes);
} catch(e){ return ‘’; }
}

// Raw DEFLATE decompressor (handles ZIP deflate entries)
function rawInflate(data){
// Try TextDecoder first for uncompressed
try {
var ds = new DecompressionStream(‘deflate-raw’);
var writer = ds.writable.getWriter();
var reader = ds.readable.getReader();
writer.write(data);
writer.close();
var chunks = [], done = false;
var result = ‘’;
// This is async but we need sync — use XMLHttpRequest blob trick
var blob = new Blob([data]);
var xhr = new XMLHttpRequest();
xhr.open(‘GET’, URL.createObjectURL(blob), false);
// Can’t decompress synchronously easily — return raw for XML detection
return new TextDecoder().decode(data);
} catch(e){
return new TextDecoder().decode(data);
}
}

var rowContent = rowMatch[1];
while((cellMatch = cellRe.exec(rowContent)) !== null){
var dataMatch = dataRe.exec(cellMatch[1]);
row.push(dataMatch ? dataMatch[1].trim() : ‘’);
}
if(row.length > 0) rows.push(row);
}
return rows;
}

function parseHTMLTable(html){
var rows = [];
var trRe = /<tr[^>]*>([\s\S]*?)</tr>/gi;
var tdRe = /<t[dh][^>]*>([\s\S]*?)</t[dh]>/gi;
var tagRe = /<[^>]+>/g;
var trMatch;
while((trMatch = trRe.exec(html)) !== null){
var row = [], tdMatch;
tdRe.lastIndex = 0;
while((tdMatch = tdRe.exec(trMatch[1])) !== null){
row.push(tdMatch[1].replace(tagRe,’’).trim());
}
if(row.length > 0) rows.push(row);
}
return rows;
}

function extractAddresses(rows){
if(!rows || rows.length < 2) return [];
var header = rows[0].map(function(h){ return String(h).toLowerCase().trim(); });

var c1 = header.findIndex(function(h){ return h.includes(‘address’) && (h.includes(‘1’)||h===‘address’); });
var c2 = header.findIndex(function(h){ return h.includes(‘address’) && h.includes(‘2’); });
var cc = header.findIndex(function(h){ return h===‘city’; });
var cs = header.findIndex(function(h){ return h===‘state’||h===‘state_code’; });
var cz = header.findIndex(function(h){ return h.includes(‘postal’)||h.includes(‘zip’); });

if(c1<0) c1=3; if(c2<0) c2=4; if(cc<0) cc=5; if(cs<0) cs=6; if(cz<0) cz=7;

var addrs = [];
for(var i=1;i<rows.length;i++){
var r=rows[i];
var v1=String(r[c1]||’’).trim(); if(!v1) continue;
var v2=String(r[c2]||’’).trim();
var vc=String(r[cc]||’’).trim();
var vs=String(r[cs]||’’).trim();
var vz=String(r[cz]||’’).trim();
var a=v1;
if(v2) a+=’ ‘+v2;
if(vc) a+=’ ‘+vc;
if(vs) a+=’, ‘+vs;
if(vz) a+=’ ’+vz;
addrs.push(a);
}
return addrs;
}
